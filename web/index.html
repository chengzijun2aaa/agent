<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emotion Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="side-panel" aria-label="状态面板">
        <div class="brand">
          <div class="brand-mark">EA</div>
          <div>
            <h1>Emotion Agent</h1>
            <p>微信情感聊天工作台</p>
          </div>
        </div>

        <section class="metric-grid" aria-label="关系指标">
          <div class="metric">
            <span>阶段</span>
            <strong id="stage">L1 陌生</strong>
          </div>
          <div class="metric">
            <span>风险</span>
            <strong id="risk">low</strong>
          </div>
          <div class="metric">
            <span>评分</span>
            <strong id="score">-</strong>
          </div>
          <div class="metric">
            <span>意图</span>
            <strong id="intent">-</strong>
          </div>
        </section>

        <section class="panel-section">
          <h2>候选回复</h2>
          <ol id="candidates" class="candidate-list"></ol>
        </section>
      </aside>

      <section class="chat-panel" aria-label="聊天窗口">
        <div id="messages" class="messages">
          <div class="bubble assistant">
            <span>可以开始聊天了，我会根据关系阶段、记忆和风险来回复。</span>
          </div>
        </div>

        <form id="chat-form" class="composer">
          <button id="reset-button" class="icon-button" type="button" title="清空当前对话" aria-label="清空当前对话">
            ↺
          </button>
          <textarea
            id="message-input"
            name="message"
            rows="1"
            placeholder="输入对方发来的消息..."
            autocomplete="off"
          ></textarea>
          <button id="send-button" class="send-button" type="submit">发送</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
